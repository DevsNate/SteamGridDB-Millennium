name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Package plugin
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./plugin.json').version")"
          ARCHIVE="SteamGridDB-Millennium-v${VERSION}.zip"
          rm -rf release
          mkdir -p release/SteamGridDB
          cp plugin.json package.json pnpm-lock.yaml README.md RELEASE_NOTES.md tsconfig.json release/SteamGridDB/
          cp -R backend frontend .millennium release/SteamGridDB/
          cd release
          zip -r "$ARCHIVE" SteamGridDB
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "artifact=SteamGridDB-Millennium-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: release/${{ steps.package.outputs.archive }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SteamGridDB ${{ steps.package.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: release/${{ steps.package.outputs.archive }}
